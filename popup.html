<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 280px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f1117;
        color: white;
      }

      .header {
        background: #1a1a2e;
        padding: 14px 16px;
        border-bottom: 1px solid #2a2a4a;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .header h3 { font-size: 14px; font-weight: 600; }

      .page-info {
        padding: 14px 16px;
        border-bottom: 1px solid #1e1e36;
      }

      .info-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 10px;
      }

      .info-row:last-child { margin-bottom: 0; }

      .info-text {
        font-size: 12px;
        color: #aaa;
        line-height: 1.4;
        word-break: break-all;
      }

      .stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        background: #1e1e36;
      }

      .stat-card {
        background: #0f1117;
        padding: 16px;
        text-align: center;
      }

      .stat-number {
        font-size: 28px;
        font-weight: 700;
        color: #4285F4;
        display: block;
        margin-bottom: 5px;
      }

      .stat-label {
        font-size: 10px;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <span>📖</span>
      <h3>Reading Time</h3>
    </div>

    <div class="page-info">
      <div class="info-row">
        <span>📄</span>
        <span class="info-text" id="title">Loading...</span>
      </div>
      <div class="info-row">
        <span>🔗</span>
        <span class="info-text" id="url">Loading...</span>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <span class="stat-number" id="word-count">—</span>
        <span class="stat-label">words</span>
      </div>
      <div class="stat-card">
        <span class="stat-number" id="read-time">—</span>
        <span class="stat-label">min read</span>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
